<style>
  :root {
    --cream: #faf9f5;
    --cream-deep: #f3efe3;
    --ink: #1a1a1a;
    --ink-soft: #3d3d3a;
    --ink-mute: #6b6b66;
    --rule: #d9d6cc;
    --clay: #cc785c;
    --clay-deep: #a85a42;
    --code-bg: #f2f0e8;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--cream);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  body {
    font-family: "Fraunces", "Noto Serif KR", Georgia, serif;
    font-weight: 300;
    font-size: 18px;
    line-height: 1.72;
    letter-spacing: -0.005em;
  }

  /* ===== TOP NAV ===== */
  .topnav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 48px; background: rgba(250, 249, 245, 0.92);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--rule);
    z-index: 100; display: flex; align-items: center;
    justify-content: space-between;
    padding: 0 24px;
    font-family: "Inter", "Noto Sans KR", sans-serif;
    font-size: 13px;
  }
  .topnav-left { display: flex; align-items: center; gap: 18px; }
  .topnav-left a { color: var(--ink-soft); text-decoration: none; transition: color 0.2s; }
  .topnav-left a:hover { color: var(--clay-deep); }
  .topnav-home {
    font-family: "Fraunces", "Noto Serif KR", serif;
    font-weight: 600; font-size: 16px;
    color: var(--ink) !important; letter-spacing: -0.3px;
  }
  .topnav-sep { color: var(--rule); font-size: 11px; }
  .topnav-current {
    color: var(--ink) !important; font-weight: 600; position: relative;
  }
  .topnav-current::after {
    content: ''; position: absolute; bottom: -2px; left: 0; right: 0;
    height: 2px; background: var(--clay); border-radius: 1px;
  }
  .topnav-right { display: flex; gap: 16px; }
  .topnav-right a {
    color: var(--ink-mute); text-decoration: none;
    font-size: 12px; transition: color 0.2s;
  }
  .topnav-right a:hover { color: var(--clay-deep); }

  /* ===== WRAP ===== */
  .wrap {
    max-width: 820px;
    margin: 0 auto;
    padding: 116px 28px 120px;
  }

  /* ===== BREADCRUMB ===== */
  .breadcrumb {
    font-family: "Inter", "Noto Sans KR", sans-serif;
    font-size: 12px; margin-bottom: 36px;
    display: flex; align-items: center; gap: 8px;
    color: var(--ink-mute);
  }
  .breadcrumb a { color: var(--clay-deep); text-decoration: none; transition: color 0.2s; }
  .breadcrumb a:hover { color: var(--ink); }
  .breadcrumb .bc-sep { color: var(--rule); }

  /* ===== HEADER ===== */
  .kicker {
    font-family: "Inter", "Noto Sans KR", sans-serif;
    font-size: 12px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--clay-deep); margin-bottom: 24px;
  }
  .title {
    font-family: "Fraunces", "Noto Serif KR", serif;
    font-weight: 400; font-size: 56px;
    line-height: 1.1; letter-spacing: -0.025em;
    margin: 0 0 24px; color: var(--ink);
  word-break:keep-all;overflow-wrap:break-word;}
  .lede {
    font-family: "Fraunces", "Noto Serif KR", serif;
    font-weight: 300; font-style: italic;
    font-size: 20px; line-height: 1.6;
    color: var(--ink-soft);
    max-width: 620px;
    margin: 0 0 72px;
  word-break:keep-all;overflow-wrap:break-word;}

  /* ===== POST LIST ===== */
  .posts {
    border-top: 1px solid var(--rule);
  }
  .post {
    padding: 40px 0;
    border-bottom: 1px solid var(--rule);
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 32px;
  }
  .post-meta {
    font-family: "Inter", "Noto Sans KR", sans-serif;
    font-size: 12px; color: var(--ink-mute);
    line-height: 1.6; padding-top: 8px;
  }
  .post-date {
    font-weight: 600; color: var(--ink-soft);
    letter-spacing: 0.04em;
  }
  .post-category {
    display: block; margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 0.1em; font-size: 10px;
    color: var(--clay);
  }
  .post-body { }
  .post-body a { text-decoration: none; color: inherit; }
  .post-title {
    font-family: "Fraunces", "Noto Serif KR", serif;
    font-weight: 500; font-size: 28px;
    line-height: 1.25; letter-spacing: -0.015em;
    margin: 0 0 12px; color: var(--ink);
    transition: color 0.2s;
  word-break:keep-all;overflow-wrap:break-word;}
  .post-body a:hover .post-title { color: var(--clay-deep); word-break:keep-all;overflow-wrap:break-word;}
  .post-dek {
    font-family: "Fraunces", "Noto Serif KR", serif;
    font-weight: 300; font-style: italic;
    font-size: 17px; line-height: 1.6;
    color: var(--ink-soft); margin: 0 0 16px;
  word-break:keep-all;overflow-wrap:break-word;}
  .post-readmore {
    font-family: "Inter", "Noto Sans KR", sans-serif;
    font-size: 12px; font-weight: 500;
    color: var(--clay-deep);
    letter-spacing: 0.02em;
    display: inline-flex; align-items: center; gap: 6px;
  }

  /* ===== EMPTY NOTE ===== */
  .note {
    margin-top: 56px;
    padding: 24px 28px;
    background: var(--code-bg);
    border-left: 3px solid var(--clay);
    font-family: "Fraunces", "Noto Serif KR", serif;
    font-style: italic;
    font-size: 15px;
    color: var(--ink-soft);
    line-height: 1.65;
  }

  @media (max-width: 640px) {
    .wrap { padding: 92px 22px 80px; }
    .title { font-size: 38px; word-break:keep-all;overflow-wrap:break-word;}
    .lede { font-size: 17px; margin-bottom: 48px; word-break:keep-all;overflow-wrap:break-word;}
    .post {
      grid-template-columns: 1fr;
      gap: 12px;
      padding: 32px 0;
    }
    .post-meta { padding-top: 0; }
    .post-title { font-size: 24px; word-break:keep-all;overflow-wrap:break-word;}
    .topnav-right { display: none; }
  }

  @media (max-width: 400px) {
    h1 { font-size: 26px !important; line-height: 1.22; }
    .dek { font-size: 16px !important; }
    h2 { font-size: 22px !important; }
    .post-title { font-size: 20px !important; }
    .title { font-size: 30px !important; }
  }
</style>
